# SonarCloud — analysis settings here; token in CI (-Dsonar.token).
# Host for GitHub Actions: SONAR_HOST_URL in .github/workflows/sonarcloud.yml (Maven bootstrap picks it up reliably).
# For local Maven analysis: export SONAR_HOST_URL=https://sonarcloud.io or keep sonar.host.url below.

sonar.organization=defra
sonar.projectKey=DEFRA_trade-imports-animals-backend
sonar.projectName=Trade Imports Animals Backend

sonar.host.url=https://sonarcloud.io
sonar.sourceEncoding=UTF-8

sonar.sources=src/main/java
sonar.tests=src/test/java

sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

sonar.exclusions=target/**
sonar.coverage.exclusions=src/test/**,**/*Test.java,**/*IT.java
