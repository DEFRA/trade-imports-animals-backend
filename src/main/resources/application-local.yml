# Development profile - exposes additional actuator endpoints for debugging
# MongoDB URI should be set via MONGO_URI environment variable
# (defaults are in application.yml)

logging:
  level:
    root: INFO
    uk.gov.defra.trade.imports.animals: DEBUG
    org.mongodb.driver: ${LOGGING_LEVEL_ORG_MONGODB_DRIVER:WARN}
    org.springframework: ${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK:INFO}
    org.springframework.web: ${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB:INFO}
    software.amazon.cloudwatchlogs.emf: ERROR

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env
  endpoint:
    health:
      show-details: when-authorized
spring:
  data:
    mongodb:
      ssl:
        enabled: false

# SpringDoc — enable Swagger UI locally
springdoc:
  swagger-ui:
    enabled: true

# App-level overrides for local development
# AWS credentials are dummy values accepted by Floci — never use real keys here
# base-url: cdp-uploader (inside Docker) POSTs scan-result callbacks here, so
# host.docker.internal is required; plain localhost is unreachable from inside the
# cdp-uploader container. Kept out of application.yml so deployed environments fail
# fast if TRADE_IMPORTS_ANIMALS_BACKEND_BASE_URL is unset.
app:
  aws:
    endpoint-override: ${APP_AWS_ENDPOINT_OVERRIDE:http://localhost:4566}
    access-key-id: test
    secret-access-key: test
  base-url: ${TRADE_IMPORTS_ANIMALS_BACKEND_BASE_URL:http://host.docker.internal:8085}
